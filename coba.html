<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mau Jadi Pacarku?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#fff0f6;
      --pink:#e91e63;
      --ok:#43a047;
      --no:#f4511e;
    }

    *{ box-sizing:border-box }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      font-family:system-ui;
      text-align:center;
      padding:16px;
    }

    .container{
      width:100%;
      max-width:420px;
    }

    h1{
      font-size:26px;
      color:#7a0040;
      margin-bottom:8px;
    }

    p{
      color:#7a0040;
      margin-bottom:16px;
      font-size:14px;
    }

    .board{
      position:relative;
      width:100%;
      height:220px;
      background:white;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(233,30,99,.2);
      overflow:hidden;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 16px;
      font-weight:bold;
      cursor:pointer;
      position:absolute;
      transition:all 0.2s ease;
    }

    #mau{
      background:var(--ok);
      color:white;
      left:50%;
      top:70%;
      transform:translate(-50%, -50%);
    }

    #gamau{
      background:var(--no);
      color:white;
    }

    #mau:active{
      transform:translate(-50%, -50%) scale(0.95);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Mau nggak jadi pacarku? 😁✨</h1>
    <p>Pilih jujur ya… hati-hati tombolnya nakal 😜</p>

    <div class="board" id="board">
      <button id="mau">Mau! 💚</button>
      <button id="gamau">Gamau 🙅‍♀️</button>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const gamau = document.getElementById('gamau');
    const mau = document.getElementById('mau');

    function moveButton(){
      const rect = board.getBoundingClientRect();
      const btnWidth = gamau.offsetWidth;
      const btnHeight = gamau.offsetHeight;

      const maxX = rect.width - btnWidth - 10;
      const maxY = rect.height - btnHeight - 10;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      gamau.style.left = x + "px";
      gamau.style.top = y + "px";
    }

    // posisi awal
    moveButton();

    // Desktop (hover)
    gamau.addEventListener('mouseenter', moveButton);

    // Mobile (touch)
    gamau.addEventListener('touchstart', (e)=>{
      e.preventDefault();
      moveButton();
    });

    // fallback klik
    gamau.addEventListener('click', moveButton);

    mau.addEventListener('click', ()=>{
      alert('Yeay! Kamu resmi jadi kebahagiaanku! 💖');
    });
  </script>
</body>
</html>
